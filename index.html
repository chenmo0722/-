<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>杨凌吃哪家 🎲</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #ffd1ff 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: hidden;
    user-select: none;
  }

  h1 {
    font-size: 28px;
    color: #fff;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.2);
    margin-bottom: 8px;
    text-align: center;
  }

  .subtitle {
    font-size: 14px;
    color: #fff;
    opacity: 0.9;
    margin-bottom: 30px;
    text-align: center;
  }

  .display {
    width: 90%;
    max-width: 400px;
    height: 280px;
    background: rgba(255,255,255,0.95);
    border-radius: 24px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px;
    margin-bottom: 40px;
    overflow: hidden;
    position: relative;
  }

  .store-name {
    font-size: 32px;
    font-weight: bold;
    color: #ff6b6b;
    text-align: center;
    word-break: break-all;
    line-height: 1.4;
  }

  .placeholder {
    font-size: 18px;
    color: #999;
    text-align: center;
  }

  .placeholder .emoji { font-size: 48px; display: block; margin-bottom: 12px; }

  .buttons {
    display: flex;
    gap: 20px;
    width: 90%;
    max-width: 400px;
  }

  button {
    flex: 1;
    padding: 18px 0;
    font-size: 18px;
    font-weight: bold;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    transition: transform 0.1s, box-shadow 0.1s;
    color: #fff;
  }

  button:active { transform: scale(0.96); box-shadow: 0 3px 10px rgba(0,0,0,0.15); }

  button:disabled { opacity: 0.5; cursor: not-allowed; }

  #startBtn { background: linear-gradient(135deg, #11998e, #38ef7d); }
  #stopBtn  { background: linear-gradient(135deg, #eb3349, #f45c43); }

  .footer {
    margin-top: 30px;
    font-size: 12px;
    color: rgba(255,255,255,0.8);
    text-align: center;
  }

  @keyframes pop {
    0%   { transform: scale(0.5); opacity: 0; }
    50%  { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }
  .pop { animation: pop 0.4s ease-out; }
</style>
</head>
<body>
  <h1>🍜 杨凌吃哪家 🎲</h1>
  <div class="subtitle">点开始疯狂转，点击结束看缘分</div>

  <div class="display" id="display">
    <div class="placeholder" id="placeholder">
      <span class="emoji">🍽️</span>
      准备好吃啥了吗？
    </div>
  </div>

  <div class="buttons">
    <button id="startBtn">开始 🎰</button>
    <button id="stopBtn" disabled>停止 ✋</button>
  </div>

  <div class="footer">店铺名单可编辑本页面 stores 数组</div>

<script>
  // ===== 杨凌示范区店铺名单 =====
  // 老爹可自行增删改, 字符串就行
  const stores = [
    "老白家面馆",
    "杨凌蘸水面(老字号)",
    "马家凉皮",
    "胖子烤肉拌饭",
    "鑫源烧烤",
    "川味轩",
    "兰州拉面(邰城路)",
    "杨凌第一家",
    "老潼关肉夹馍",
    "袁记肉夹馍",
    "魏家凉皮",
    "蜜雪冰城(步行街)",
    "正新鸡排",
    "黄焖鸡米饭",
    "杨凌小吃城",
    "后稷路边摊",
    "邰城路夜市烤肉",
    "马超路串串",
    "西农大南门小吃街",
    "康乐食堂"
  ];

  const display   = document.getElementById('display');
  const startBtn  = document.getElementById('startBtn');
  const stopBtn   = document.getElementById('stopBtn');
  let timer       = null;
  let isRunning   = false;

  function pickRandom() {
    return stores[Math.floor(Math.random() * stores.length)];
  }

  function showName(name, animated=false) {
    display.innerHTML = `<div class="store-name ${animated ? 'pop' : ''}">${name}</div>`;
  }

  function reset() {
    display.innerHTML = `
      <div class="placeholder" id="placeholder">
        <span class="emoji">🍽️</span>
        准备好吃啥了吗？
      </div>`;
  }

  startBtn.addEventListener('click', () => {
    if (isRunning) return;
    isRunning = true;
    startBtn.disabled = true;
    stopBtn.disabled  = false;

    timer = setInterval(() => {
      showName(pickRandom());
    }, 80); // 滚动速度
  });

  stopBtn.addEventListener('click', () => {
    if (!isRunning) return;
    clearInterval(timer);
    isRunning = false;
    startBtn.disabled = false;
    stopBtn.disabled  = true;

    const final = pickRandom();
    showName(final, true);

    // 震动反馈 (支持的设备)
    if (navigator.vibrate) navigator.vibrate(100);
  });
</script>
</body>
</html>
